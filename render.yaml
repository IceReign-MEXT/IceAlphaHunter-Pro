services:
  - type: web
    name: icealphahunter-pro
    runtime: docker
    plan: standard
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: WALLET_PRIVATE_KEY
        sync: false
      - key: WALLET_ADDRESS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RUGCHECK_API_KEY
        sync: false
      - key: AUTO_TRADE
        value: "true"
      - key: MIN_WHALE_SIZE
        value: "5000"
      - key: MAX_POSITION_SOL
        value: "10.0"
      - key: SLIPPAGE
        value: "1.0"
      - key: TAKE_PROFIT
        value: "20.0"
      - key: STOP_LOSS
        value: "-10.0"
    autoDeploy: true
