services:
  - type: worker
    name: icealpha-hunter-bot
    runtime: docker
    plan: starter
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: WALLET_PRIVATE_KEY
        sync: false
      - key: WALLET_PUBLIC_KEY
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: MIN_WHALE_AMOUNT_USD
        value: 5000
      - key: MAX_POSITION_SOL
        value: 1.0
      - key: SLIPPAGE_BPS
        value: 100
      - key: AUTO_TRADE_ENABLED
        value: false
      - key: DATABASE_URL
        sync: false
