services:
  - type: web
    name: icealpha-hunter
    runtime: python
    plan: starter
    
    # Force Python 3.11
    envVars:
      - key: RENDER_PYTHON_VERSION
        value: 3.11.0
    
    buildCommand: |
      # Install Python 3.11 if available
      apt-get update && apt-get install -y python3.11 python3.11-pip 2>/dev/null || true
      pip install --upgrade pip
      pip install -r requirements.txt
    
    startCommand: python main.py

databases:
  - name: icealpha-db
    databaseName: icealpha
    user: icealpha
